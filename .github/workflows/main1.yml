name: Basic CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # --------------------------------------------------
  # 1️⃣ Build & Test Job
  # --------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Setup Java (for Maven)
      # -----------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven   # ✅ Maven cache enabled

      # -----------------------------
      # Setup .NET
      # -----------------------------
      - name: Set up Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # -----------------------------
      # Cache NuGet packages
      # -----------------------------
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # -----------------------------
      # Build Maven project
      # -----------------------------
      - name: Build with Maven
        working-directory: simple-maven-project
        run: mvn clean verify


  # --------------------------------------------------
  # 2️⃣ Code Quality Job (Separate)
  # --------------------------------------------------
  code-quality:
    runs-on: ubuntu-latest
    needs: build   # ✅ Runs after build succeeds

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Setup .NET
      # -----------------------------
      - name: Set up Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # -----------------------------
      # Cache NuGet packages
      # -----------------------------
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # -----------------------------
      # Cache SonarScanner
      # -----------------------------
      - name: Cache SonarScanner
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-sonarscanner

      # -----------------------------
      # Run Code Quality
      # -----------------------------
      - name: Run Code Quality Parametrised
        run: |
          chmod +x cav_scanner.sh
          ./cav_scanner.sh \
            --projectKey my_unique_testing_key11 \
            --hostUrl https://sonar.cav-test.com/sonar \
            --sonarToken "sqa_ee292a9e84a10fce829cb5e4a3be9f075c2944cf"
